<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delhi Disease Outbreak Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

<style>
:root {
  --dengue:  #E85D30;
  --cholera: #2B7FD4;
  --typhoid: #16A37A;
  --anomaly: #E8253A;
  --bg:      #0B0E14;
  --panel:   #111520;
  --border:  rgba(255,255,255,0.07);
  --text:    #C8D0E0;
  --muted:   #5A6480;
  --accent:  #3B82F6;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

/* HEADER */
header {
  position: fixed; top: 0; left: 0; right: 0; height: 52px; z-index: 1000;
  background: var(--panel); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
}
.logo {
  font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600;
  color: #fff; display: flex; align-items: center; gap: 10px; letter-spacing: 0.06em;
}
.pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--anomaly); animation: blink 1.8s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }
.hstats { display: flex; gap: 24px; }
.hstat-val { font-family: 'JetBrains Mono', monospace; font-size: 17px; font-weight: 600; color: #fff; line-height: 1; }
.hstat-lbl { font-size: 10px; color: var(--muted); letter-spacing: 0.07em; text-transform: uppercase; margin-top: 2px; }

/* SIDEBAR */
aside {
  position: fixed; top: 52px; left: 0; bottom: 0; width: 264px; z-index: 900;
  background: var(--panel); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow-y: auto;
}
.sec { padding: 14px 16px; border-bottom: 1px solid var(--border); }
.sec-title {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
}

/* radio pills */
.pills { display: flex; gap: 4px; flex-wrap: wrap; }
.pill {
  padding: 5px 9px; font-size: 11px; border: 1px solid var(--border);
  border-radius: 4px; cursor: pointer; background: transparent; color: var(--muted);
  font-family: 'JetBrains Mono', monospace; transition: all 0.15s; letter-spacing: 0.04em;
}
.pill:hover { background: rgba(255,255,255,0.04); }
.pill.on { background: rgba(59,130,246,0.15); border-color: var(--accent); color: #fff; }

/* disease filter buttons */
.dis-btn {
  display: flex; align-items: center; gap: 9px; width: 100%;
  padding: 7px 9px; background: transparent; border: 1px solid var(--border);
  border-radius: 6px; cursor: pointer; font-family: 'DM Sans', sans-serif;
  font-size: 13px; color: var(--text); margin-bottom: 5px; transition: all 0.15s;
}
.dis-btn:hover { background: rgba(255,255,255,0.04); }
.dis-btn.on { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); }
.dis-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
.dis-cnt { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); }

/* sliders */
.ctrl { margin-bottom: 11px; }
.ctrl-lbl { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
.ctrl-lbl span:last-child { font-family: 'JetBrains Mono', monospace; color: var(--text); }
input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }

/* checkboxes */
.chk-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); cursor: pointer; margin-bottom: 6px; }

/* alerts */
.alert-item {
  padding: 8px 10px; border-radius: 6px; margin-bottom: 5px;
  border-left: 3px solid var(--anomaly); background: rgba(232,37,58,0.08);
  cursor: pointer; transition: background 0.15s; font-size: 12px;
}
.alert-item:hover { background: rgba(232,37,58,0.16); }
.al-title { font-weight: 500; color: #fff; margin-bottom: 2px; }
.al-meta { color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 10px; }

/* MAP */
#map { position: fixed; top: 52px; left: 264px; right: 0; bottom: 0; z-index: 1; }

/* override leaflet popup */
.leaflet-popup-content-wrapper {
  background: rgba(11,14,20,0.97) !important;
  border: 1px solid rgba(255,255,255,0.12) !important;
  border-radius: 8px !important; color: var(--text) !important;
  box-shadow: 0 8px 32px rgba(0,0,0,0.7) !important;
  backdrop-filter: blur(8px);
}
.leaflet-popup-tip { background: rgba(11,14,20,0.97) !important; }
.leaflet-popup-content { margin: 10px 14px !important; font-family: 'DM Sans', sans-serif !important; font-size: 13px !important; line-height: 1.6; }
.pop-title { font-weight: 600; font-size: 14px; color: #fff; margin-bottom: 6px; }
.pop-row { display: flex; justify-content: space-between; gap: 16px; color: var(--muted); font-size: 12px; }
.pop-row span:last-child { color: var(--text); font-family: 'JetBrains Mono', monospace; }
.pop-anom { color: var(--anomaly); font-size: 11px; font-weight: 600; margin-top: 6px; letter-spacing: 0.04em; }

/* legend */
#legend {
  position: fixed; bottom: 16px; right: 16px; z-index: 1000;
  background: rgba(11,14,20,0.92); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 14px; font-size: 11px; color: var(--muted);
  backdrop-filter: blur(8px);
}
#legend div { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
#legend div:last-child { margin-bottom: 0; }
.leg-sq { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

/* tooltip */
#tt {
  position: fixed; background: rgba(11,14,20,0.97); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px; padding: 10px 13px; font-size: 12px; pointer-events: none;
  display: none; z-index: 9999; max-width: 200px; line-height: 1.6;
  box-shadow: 0 6px 24px rgba(0,0,0,0.6); backdrop-filter: blur(8px);
}
.tt-title { font-weight: 600; color: #fff; margin-bottom: 5px; font-size: 13px; }
.tt-row { display: flex; justify-content: space-between; gap: 14px; color: var(--muted); }
.tt-row span:last-child { font-family: 'JetBrains Mono', monospace; color: var(--text); }
.tt-anom { color: var(--anomaly); font-size: 11px; margin-top: 5px; font-weight: 600; }

@keyframes anomPulse { 0%,100%{opacity:1} 50%{opacity:0.45} }
</style>
</head>
<body>

<header>
  <div class="logo"><div class="pulse-dot"></div>DELHI · OUTBREAK MONITOR · OSM</div>
  <div class="hstats">
    <div><div class="hstat-val" id="h-total">—</div><div class="hstat-lbl">Patients</div></div>
    <div><div class="hstat-val" id="h-clusters">—</div><div class="hstat-lbl">Clusters</div></div>
    <div><div class="hstat-val" id="h-alerts" style="color:var(--anomaly)">—</div><div class="hstat-lbl">Alerts</div></div>
  </div>
</header>

<aside>
  <div class="sec">
    <div class="sec-title">Map Layer</div>
    <div class="pills">
      <button class="pill on" onclick="setLayer('hex',this)">HEX</button>
      <button class="pill"    onclick="setLayer('heat',this)">HEAT</button>
      <button class="pill"    onclick="setLayer('dots',this)">DOTS</button>
      <button class="pill"    onclick="setLayer('all',this)">ALL</button>
    </div>
  </div>

  <div class="sec">
    <div class="sec-title">Disease</div>
    <button class="dis-btn on" onclick="setDisease('all',this)">
      <div class="dis-dot" style="background:linear-gradient(135deg,var(--dengue),var(--cholera))"></div>
      All <span class="dis-cnt" id="c-all">—</span>
    </button>
    <button class="dis-btn" onclick="setDisease('Dengue',this)">
      <div class="dis-dot" style="background:var(--dengue)"></div>
      Dengue <span class="dis-cnt" id="c-dengue">—</span>
    </button>
    <button class="dis-btn" onclick="setDisease('Cholera',this)">
      <div class="dis-dot" style="background:var(--cholera)"></div>
      Cholera <span class="dis-cnt" id="c-cholera">—</span>
    </button>
    <button class="dis-btn" onclick="setDisease('Typhoid',this)">
      <div class="dis-dot" style="background:var(--typhoid)"></div>
      Typhoid <span class="dis-cnt" id="c-typhoid">—</span>
    </button>
  </div>

  <div class="sec">
    <div class="sec-title">Controls</div>
    <div class="ctrl">
      <div class="ctrl-lbl"><span>Hex size (meters)</span><span id="lv-hex">600m</span></div>
      <input type="range" min="200" max="2000" value="600" step="100" oninput="setHexSize(+this.value)">
    </div>
    <div class="ctrl">
      <div class="ctrl-lbl"><span>Heat radius</span><span id="lv-hr">28</span></div>
      <input type="range" min="10" max="80" value="28" step="2" oninput="setHeatRadius(+this.value)">
    </div>
    <div class="ctrl">
      <div class="ctrl-lbl"><span>Heat blur</span><span id="lv-hb">18</span></div>
      <input type="range" min="5" max="50" value="18" step="1" oninput="setHeatBlur(+this.value)">
    </div>
    <label class="chk-row"><input type="checkbox" id="chk-anom" checked onchange="render()"> Highlight anomalies</label>
    <label class="chk-row"><input type="checkbox" id="chk-weight" checked onchange="render()"> Weight home/work nodes</label>
  </div>

  <div class="sec" style="flex:1">
    <div class="sec-title">Active Alerts</div>
    <div id="alert-list"></div>
  </div>
</aside>

<div id="map"></div>

<div id="legend">
  <div><div class="leg-sq" style="background:var(--dengue)"></div>Dengue</div>
  <div><div class="leg-sq" style="background:var(--cholera)"></div>Cholera</div>
  <div><div class="leg-sq" style="background:var(--typhoid)"></div>Typhoid</div>
  <div style="margin-top:3px"><div class="leg-sq" style="background:var(--anomaly);outline:1.5px solid #fff;outline-offset:-1px"></div>Anomaly zone</div>
</div>

<div id="tt"></div>

<script>
// ─── SYNTHETIC DATA (same seed as pipeline) ───────────────────────
function rng32(seed) {
  let a = seed;
  return () => {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function buildPatients() {
  const rng = rng32(42);
  const patients = [];
  const clusters = [
    { lat:28.620, lng:77.210, disease:'Dengue',  n:30, anomW:[8,9,10], cid:0 },
    { lat:28.650, lng:77.180, disease:'Dengue',  n:22, anomW:[],       cid:1 },
    { lat:28.595, lng:77.235, disease:'Cholera', n:28, anomW:[5,6],    cid:2 },
    { lat:28.640, lng:77.260, disease:'Cholera', n:18, anomW:[],       cid:3 },
    { lat:28.630, lng:77.200, disease:'Typhoid', n:26, anomW:[12],     cid:4 },
    { lat:28.610, lng:77.250, disease:'Typhoid', n:24, anomW:[],       cid:5 },
  ];
  const t0 = new Date('2024-01-01');
  clusters.forEach(c => {
    for (let i = 0; i < c.n; i++) {
      const week = Math.floor(rng() * 20);
      const isAnom = c.anomW.includes(week);
      const d = new Date(t0); d.setDate(d.getDate() + week*7 + Math.floor(rng()*7));
      patients.push({
        id: `P${(patients.length+1).toString().padStart(4,'0')}`,
        home: { lat: c.lat + (rng()-0.5)*0.018, lng: c.lng + (rng()-0.5)*0.018 },
        work: { lat: c.lat + (rng()-0.5)*0.040, lng: c.lng + (rng()-0.5)*0.040 },
        disease: c.disease, conf: +(0.65 + rng()*0.34).toFixed(2),
        week, isAnom, cid: c.cid, date: d.toISOString().slice(0,10),
      });
    }
  });
  for (let i = 0; i < 30; i++) {
    const dis = ['Dengue','Cholera','Typhoid'][Math.floor(rng()*3)];
    const d = new Date(t0); d.setDate(d.getDate() + Math.floor(rng()*140));
    patients.push({
      id: `P${(patients.length+1).toString().padStart(4,'0')}`,
      home: { lat: 28.555+rng()*0.14, lng: 77.13+rng()*0.17 },
      work: { lat: 28.555+rng()*0.14, lng: 77.13+rng()*0.17 },
      disease: dis, conf: +(0.50+rng()*0.3).toFixed(2),
      week: Math.floor(rng()*20), isAnom: false, cid: -1,
      date: d.toISOString().slice(0,10),
    });
  }
  return patients;
}

const PATIENTS = buildPatients();
const COLORS = {
  Dengue:  '#E85D30',
  Cholera: '#2B7FD4',
  Typhoid: '#16A37A',
};

// ─── STATE ────────────────────────────────────────────────────────
let currentLayer = 'hex';
let currentDisease = 'all';
let hexSize = 600; // fixed meters — zoom-independent
let heatRadius = 28;
let heatBlur = 18;

let hexLayers = [];
let heatLayer = null;
let dotLayers = [];

// ─── MAP SETUP ────────────────────────────────────────────────────
const map = L.map('map', {
  center: [28.625, 77.215],
  zoom: 13,
  zoomControl: true,
  attributionControl: true,
});

// OpenStreetMap dark-ish tile (CartoDB Dark Matter — free, no key)
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19,
}).addTo(map);

// ─── HEX BINNING — zoom-independent (size in real-world METERS) ──
// Grid indices are computed purely from geography, never from screen pixels.
// hexSize is the hex radius in meters. Changing zoom never affects bin assignment.

const EARTH = 40075016.686;
const M_PER_DEG = EARTH / 360;
const REF_LAT   = 28.62;
const M_PER_LNG = M_PER_DEG * Math.cos(REF_LAT * Math.PI / 180);

function latLngToHex(lat, lng, radiusM) {
  const dx = radiusM * Math.sqrt(3);
  const dy = radiusM * 1.5;
  const px = lng * M_PER_LNG;
  const py = lat * M_PER_DEG;
  const col = Math.round(px / dx);
  const row = Math.round(py / dy);
  return { col, row };
}

function hexCenter(col, row, radiusM) {
  const dx = radiusM * Math.sqrt(3);
  const dy = radiusM * 1.5;
  const px = col * dx + (((row % 2) + 2) % 2 === 0 ? 0 : dx / 2);
  const py = row * dy;
  return {
    lat: py / M_PER_DEG,
    lng: px / M_PER_LNG,
  };
}

function hexRing(cLat, cLng, radiusM) {
  const mPerLat = M_PER_DEG;
  const mPerLng = M_PER_DEG * Math.cos(cLat * Math.PI / 180);
  return Array.from({ length: 6 }, (_, i) => {
    const ang = Math.PI / 180 * (60 * i - 30);
    return [
      cLat + (radiusM * Math.sin(ang)) / mPerLat,
      cLng + (radiusM * Math.cos(ang)) / mPerLng,
    ];
  });
}

function hexToColor(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function drawHex(pts) {
  const showAnom = document.getElementById('chk-anom').checked;
  const useWeight = document.getElementById('chk-weight').checked;
  const bins = new Map();
  const radiusM = hexSize; // hexSize IS the real-world meter radius — zoom independent

  pts.forEach(p => {
    ['home','work'].forEach(loc => {
      const w = useWeight ? (loc==='home' ? 0.7 : 0.3) : 0.5;
      const { col, row } = latLngToHex(p[loc].lat, p[loc].lng, radiusM);
      const key = `${col}_${row}`;
      if (!bins.has(key)) bins.set(key, { col, row, pts: [] });
      bins.get(key).pts.push({ ...p, w, loc });
    });
  });

  const maxN = Math.max(...[...bins.values()].map(b => b.pts.length), 1);

  bins.forEach(bin => {
    const n = bin.pts.length;
    const hasAnom = showAnom && bin.pts.some(p => p.isAnom);
    const wSum = bin.pts.reduce((s,p) => s+p.w, 0);
    const dCount = {};
    bin.pts.forEach(p => { dCount[p.disease] = (dCount[p.disease]||0)+1; });
    const topD = Object.entries(dCount).sort((a,b)=>b[1]-a[1])[0][0];
    const center = hexCenter(bin.col, bin.row, radiusM);
    const verts  = hexRing(center.lat, center.lng, radiusM * 0.88);
    const opacity = 0.25 + 0.65*(n/maxN);
    const fillColor = hasAnom ? '#E8253A' : COLORS[topD];

    const poly = L.polygon(verts, {
      fillColor,
      fillOpacity: opacity,
      color: hasAnom ? '#ffffff' : '#0B0E14',
      weight: hasAnom ? 2 : 0.8,
      opacity: hasAnom ? 0.9 : 0.5,
    }).addTo(map);

    const tt = document.getElementById('tt');
    poly.on('mouseover', function(e) {
      const rows = Object.entries(dCount).map(([d,c]) =>
        `<div class="tt-row"><span>${d}</span><span>${c}</span></div>`).join('');
      tt.innerHTML = `
        <div class="tt-title">${topD} cluster</div>
        ${rows}
        <div class="tt-row"><span>Total</span><span>${n}</span></div>
        <div class="tt-row"><span>Weighted</span><span>${wSum.toFixed(1)}</span></div>
        ${hasAnom ? '<div class="tt-anom">⚠ OUTBREAK ANOMALY</div>' : ''}
      `;
      tt.style.display = 'block';
      this.setStyle({ weight: hasAnom ? 3 : 2, fillOpacity: Math.min(opacity+0.15, 0.95) });
    });
    poly.on('mousemove', function(e) {
      tt.style.left = (e.originalEvent.clientX + 14) + 'px';
      tt.style.top  = (e.originalEvent.clientY - 20) + 'px';
    });
    poly.on('mouseout', function() {
      tt.style.display = 'none';
      this.setStyle({ weight: hasAnom ? 2 : 0.8, fillOpacity: opacity });
    });
    poly.on('click', function() {
      const rows = Object.entries(dCount).map(([d,c]) =>
        `<div class="pop-row"><span>${d}</span><span>${c}</span></div>`).join('');
      this.bindPopup(`
        <div class="pop-title">${topD} — ${n} cases</div>
        ${rows}
        <div class="pop-row"><span>Weighted load</span><span>${wSum.toFixed(1)}</span></div>
        <div class="pop-row"><span>Anomaly</span><span>${hasAnom ? 'YES ⚠' : 'No'}</span></div>
        ${hasAnom ? '<div class="pop-anom">⚠ OUTBREAK ANOMALY FLAGGED</div>' : ''}
      `).openPopup();
    });

    hexLayers.push(poly);
  });
}

// ─── HEATMAP ──────────────────────────────────────────────────────
function drawHeat(pts) {
  const useWeight = document.getElementById('chk-weight').checked;
  const data = [];
  pts.forEach(p => {
    const hw = useWeight ? 0.7 : 0.5;
    const ww = useWeight ? 0.3 : 0.5;
    data.push([p.home.lat, p.home.lng, hw * p.conf]);
    data.push([p.work.lat, p.work.lng, ww * p.conf]);
  });
  heatLayer = L.heatLayer(data, {
    radius: heatRadius,
    blur: heatBlur,
    maxZoom: 16,
    gradient: { 0.0:'transparent', 0.2:'#1a3a8a', 0.4:'#2B7FD4', 0.6:'#16A37A', 0.8:'#E85D30', 1.0:'#E8253A' },
  }).addTo(map);
}

// ─── DOTS ─────────────────────────────────────────────────────────
function drawDots(pts) {
  const showAnom = document.getElementById('chk-anom').checked;
  pts.forEach(p => {
    const isA = showAnom && p.isAnom;
    const col = isA ? '#E8253A' : COLORS[p.disease];
    const m = L.circleMarker([p.home.lat, p.home.lng], {
      radius: isA ? 7 : 5,
      fillColor: col,
      fillOpacity: 0.85,
      color: '#0B0E14',
      weight: 1.2,
    }).addTo(map);
    m.on('click', () => {
      m.bindPopup(`
        <div class="pop-title">${p.id} · ${p.disease}</div>
        <div class="pop-row"><span>Date</span><span>${p.date}</span></div>
        <div class="pop-row"><span>Confidence</span><span>${(p.conf*100).toFixed(0)}%</span></div>
        <div class="pop-row"><span>Week</span><span>${p.week}</span></div>
        <div class="pop-row"><span>Cluster</span><span>${p.cid < 0 ? 'noise' : p.cid}</span></div>
        ${isA ? '<div class="pop-anom">⚠ ANOMALY FLAGGED</div>' : ''}
      `).openPopup();
    });
    dotLayers.push(m);
  });
}

// ─── CLEAR / RENDER ───────────────────────────────────────────────
function clearAll() {
  hexLayers.forEach(l => map.removeLayer(l)); hexLayers = [];
  dotLayers.forEach(l => map.removeLayer(l)); dotLayers = [];
  if (heatLayer) { map.removeLayer(heatLayer); heatLayer = null; }
}

function render() {
  clearAll();
  const pts = currentDisease === 'all'
    ? PATIENTS
    : PATIENTS.filter(p => p.disease === currentDisease);
  if (currentLayer === 'hex'  || currentLayer === 'all') drawHex(pts);
  if (currentLayer === 'heat' || currentLayer === 'all') drawHeat(pts);
  if (currentLayer === 'dots' || currentLayer === 'all') drawDots(pts);
}

// ─── UI WIRING ────────────────────────────────────────────────────
function setLayer(l, btn) {
  currentLayer = l;
  document.querySelectorAll('.pill').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  render();
}
function setDisease(d, btn) {
  currentDisease = d;
  document.querySelectorAll('.dis-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  render();
}
function setHexSize(v) {
  hexSize = v;
  document.getElementById('lv-hex').textContent = v + 'm';
  if (currentLayer==='hex'||currentLayer==='all') render();
}
function setHeatRadius(v) {
  heatRadius = v; document.getElementById('lv-hr').textContent = v;
  if (heatLayer) heatLayer.setOptions({ radius: v });
}
function setHeatBlur(v) {
  heatBlur = v; document.getElementById('lv-hb').textContent = v;
  if (heatLayer) heatLayer.setOptions({ blur: v });
}

// hex grid is zoom-independent — no zoomend re-render needed

// ─── INIT STATS & ALERTS ─────────────────────────────────────────
function initUI() {
  const byD = {Dengue:0,Cholera:0,Typhoid:0};
  PATIENTS.forEach(p => byD[p.disease]++);
  const anoms = PATIENTS.filter(p => p.isAnom);
  const clusterIds = [...new Set(PATIENTS.filter(p=>p.cid>=0).map(p=>p.cid))];

  document.getElementById('h-total').textContent    = PATIENTS.length;
  document.getElementById('h-clusters').textContent = clusterIds.length;
  document.getElementById('h-alerts').textContent   = anoms.length;
  document.getElementById('c-all').textContent      = PATIENTS.length;
  document.getElementById('c-dengue').textContent   = byD.Dengue;
  document.getElementById('c-cholera').textContent  = byD.Cholera;
  document.getElementById('c-typhoid').textContent  = byD.Typhoid;

  // Build alert list grouped by cluster+disease
  const grp = {};
  anoms.forEach(p => {
    const k = `${p.cid}_${p.disease}`;
    if (!grp[k]) grp[k] = { disease:p.disease, cid:p.cid, n:0, lat:0, lng:0, weeks:new Set() };
    grp[k].n++;
    grp[k].lat += p.home.lat;
    grp[k].lng += p.home.lng;
    grp[k].weeks.add(p.week);
  });
  const alertEl = document.getElementById('alert-list');
  alertEl.innerHTML = '';
  Object.values(grp).sort((a,b)=>b.n-a.n).forEach(g => {
    g.lat /= g.n; g.lng /= g.n;
    const div = document.createElement('div');
    div.className = 'alert-item';
    div.innerHTML = `
      <div class="al-title">${g.disease} · Cluster ${g.cid}</div>
      <div class="al-meta">${g.n} cases · ${g.weeks.size} anomaly weeks</div>
    `;
    div.onclick = () => map.flyTo([g.lat, g.lng], 15, { duration: 1.2 });
    alertEl.appendChild(div);
  });
}

initUI();
render();
</script>
